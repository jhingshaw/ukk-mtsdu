<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Kelas · UKK MTs Darul Ulum</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Dark Premium - Kelola Kelas */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body.admin-dark-body {
            background: radial-gradient(circle at 80% 20%, rgba(199, 160, 58, 0.12) 0%, transparent 40%),
                        radial-gradient(circle at 20% 80%, rgba(15, 43, 61, 0.2) 0%, transparent 40%),
                        linear-gradient(145deg, #1a2a38 0%, #0f2b3d 100%);
            min-height: 100vh; padding: 20px;
        }

        .admin-dark-container {
            max-width: 1400px; margin: 0 auto;
            background: rgba(20, 30, 40, 0.4); backdrop-filter: blur(20px);
            border-radius: 48px; padding: 32px;
            box-shadow: 0 40px 70px -20px rgba(0, 0, 0, 0.5), inset 0 1px 2px rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Header */
        .admin-header-premium {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 32px; padding-bottom: 24px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.05);
            flex-wrap: wrap; gap: 16px;
        }

        .header-left-premium { display: flex; align-items: center; gap: 16px; }
        .logo-glow-small { width: 50px; height: 50px; background: linear-gradient(145deg, #c7a03a, #dbb153); border-radius: 20px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 20px -5px rgba(199, 160, 58, 0.3); }
        .logo-glow-small i { font-size: 26px; color: #0f2b3d; }
        .header-left-premium h2 { font-size: 1.8rem; font-weight: 700; background: linear-gradient(145deg, #fff, #e0e0e0); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .header-left-premium p { color: rgba(255, 255, 255, 0.6); font-size: 0.9rem; margin-top: 4px; }

        .header-right-premium { display: flex; align-items: center; gap: 15px; }
        .btn-back-premium, .btn-logout-premium { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(8px); border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 40px; padding: 12px 24px; color: rgba(255, 255, 255, 0.8); font-weight: 600; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 8px; text-decoration: none; }
        .btn-back-premium:hover { border-color: #c7a03a; color: #c7a03a; }
        .btn-logout-premium:hover { border-color: #b23b3b; color: #b23b3b; }

        /* Stat Cards */
        .stats-grid-premium {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px;
        }
        .stat-mini-card-premium {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(8px);
            border-radius: 32px; padding: 24px; text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .stat-mini-value-premium { font-size: 2.8rem; font-weight: 700; color: white; }
        .stat-mini-label-premium { color: rgba(255, 255, 255, 0.5); }

        /* Cards */
        .kelola-card-premium {
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(8px);
            border-radius: 32px; padding: 28px; margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .kelas-section-title-premium {
            font-size: 1.4rem; color: white; margin: 30px 0 15px;
            display: flex; align-items: center; gap: 10px;
        }
        .kelas-section-title-premium i { color: #c7a03a; }

        .kelola-row-premium {
            display: flex; align-items: center; gap: 15px; margin-bottom: 15px; flex-wrap: wrap;
        }
        .kelola-label-premium {
            width: 50px; font-weight: 600; color: white;
        }
        .kelola-input-premium {
            flex: 1; min-width: 200px; padding: 14px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px; color: white; font-size: 1rem;
        }
        .btn-kelola-premium {
            padding: 12px 24px; border: none; border-radius: 40px;
            font-weight: 600; cursor: pointer; transition: all 0.3s;
        }
        .btn-simpan-premium { background: #c7a03a; color: #0f2b3d; }
        .btn-reset-premium { background: rgba(255, 255, 255, 0.1); color: white; border: 1px solid rgba(255, 255, 255, 0.2); }
        .btn-update-admin-premium { background: #c7a03a; color: #0f2b3d; width: 100%; padding: 16px; font-size: 1.1rem; }

        .footer-dashboard-premium { text-align: center; margin-top: 48px; padding-top: 24px; border-top: 2px solid rgba(255, 255, 255, 0.05); color: rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body class="admin-dark-body">
    <div class="admin-dark-container">
        <!-- Header -->
        <header class="admin-header-premium">
            <div class="header-left-premium">
                <div class="logo-glow-small"><i class="fas fa-cog"></i></div>
                <div><h2>KELOLA KELAS</h2><p>MTs Darul Ulum · UKK 2026</p></div>
            </div>
            <div class="header-right-premium">
                <button class="btn-back-premium" onclick="window.location.href='admin-dashboard.html'"><i class="fas fa-arrow-left"></i> Kembali</button>
                <button id="btn-logout-admin" class="btn-logout-premium"><i class="fas fa-sign-out-alt"></i> Keluar</button>
            </div>
        </header>
        
        <!-- Statistik -->
        <div class="stats-grid-premium">
            <div class="stat-mini-card-premium">
                <div class="stat-mini-value-premium" id="stat-total-kelas">9</div>
                <div class="stat-mini-label-premium">Total Kelas</div>
            </div>
            <div class="stat-mini-card-premium">
                <div class="stat-mini-value-premium" id="stat-total-murid">0</div>
                <div class="stat-mini-label-premium">Total Murid</div>
            </div>
            <div class="stat-mini-card-premium">
                <div class="stat-mini-value-premium" id="stat-terisi">0%</div>
                <div class="stat-mini-label-premium">Kapasitas Terisi</div>
            </div>
        </div>
        
        <!-- Statistik Per Kelas -->
        <div class="kelas-section-title-premium"><i class="fas fa-chart-line"></i> Statistik Per Kelas</div>
        <div class="kelola-card-premium">
            <div class="table-responsive-premium">
                <table class="kelas-table-premium">
                    <thead><tr><th>Kelas</th><th>Terisi</th><th>Progress</th></tr></thead>
                    <tbody id="stat-per-kelas-body"><tr><td colspan="3" class="loading-premium">Memuat...</td></tr></tbody>
                </table>
            </div>
        </div>
        
        <!-- Kode Akses Kelas -->
        <div class="kelas-section-title-premium"><i class="fas fa-key"></i> Kode Akses Kelas</div>
        <div class="kelola-card-premium" id="kelas-input-container"></div>
        
        <!-- Ganti Kode Admin -->
        <div class="kelas-section-title-premium"><i class="fas fa-lock"></i> Ganti Kode Admin</div>
        <div class="kelola-card-premium">
            <div class="kelola-row-premium">
                <input type="text" id="kode-admin-baru" class="kelola-input-premium" placeholder="Masukkan kode admin baru">
                <button id="btn-update-admin" class="btn-kelola-premium btn-update-admin-premium">UPDATE KODE ADMIN</button>
            </div>
            <p style="color: #c7a03a; font-size: 14px;"><i class="fas fa-info-circle"></i> Kode admin saat ini: <span id="kode-admin-saatini">-</span></p>
        </div>
        
        <footer class="footer-dashboard-premium">
            <p>developed by mochamad anugrah saputra</p>
        </footer>
    </div>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script>
    const kelasList = ['7A', '7B', '7C', '7D', '8A', '8B', '8C', '8D', '8E'];
    let kelasData = {};
    
    document.addEventListener('DOMContentLoaded', function() {
        // Cek login
        if (!sessionStorage.getItem('is_admin')) {
            window.location.href = 'admin-login.html';
            return;
        }
        
        // Logout
        document.getElementById('btn-logout-admin').addEventListener('click', function() {
            sessionStorage.removeItem('is_admin');
            window.location.href = 'admin-login.html';
        });
        
        // Load data real-time
        loadKelasData();
        loadStatistik();
        loadKodeAdmin();
        
        // Update admin button
        document.getElementById('btn-update-admin').addEventListener('click', updateKodeAdmin);
    });
    
    function loadKelasData() {
        // Load semua kelas dengan listener
        db.collection('kelas').onSnapshot((snapshot) => {
            let html = '';
            snapshot.docs.forEach(doc => {
                const data = doc.data();
                html += `
                        <div class="kelola-row">
                            <span class="kelola-label">${doc.id}</span>
                            <input type="text" id="input-${doc.id}" class="kelola-input" value="${data.kode_akses || ''}" placeholder="Kode akses...">
                            <button class="btn-kelola btn-simpan" onclick="simpanKode('${doc.id}')">
                                <i class="fas fa-save"></i> Simpan
                            </button>
                            <button class="btn-kelola btn-reset" onclick="resetKode('${doc.id}')">
                                <i class="fas fa-undo"></i> Reset
                            </button>
                        </div>
                    `;
            });
            document.getElementById('kelas-input-container').innerHTML = html;
        });
    }
    
    function loadStatistik() {
        // Total murid
        db.collection('murid').onSnapshot((snap) => {
            const total = snap.size;
            document.getElementById('stat-total-murid').innerText = total;
            
            // Kapasitas terisi
            const kapasitas = 9 * 32;
            const persen = Math.round((total / kapasitas) * 100);
            document.getElementById('stat-terisi').innerText = persen + '%';
        });
        
        // Per kelas
        kelasList.forEach(kelas => {
            db.collection('murid').where('kelas', '==', kelas).onSnapshot((snap) => {
                kelasData[kelas] = snap.size;
                renderStatPerKelas();
            });
        });
    }
    
    function renderStatPerKelas() {
        const tbody = document.getElementById('stat-per-kelas-body');
        let html = '';
        kelasList.forEach(kelas => {
            const terisi = kelasData[kelas] || 0;
            const persen = Math.round((terisi / 32) * 100);
            html += `<tr>
                    <td><strong>${kelas}</strong></td>
                    <td>${terisi} / 32</td>
                    <td>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${persen}%"></div>
                        </div>
                        <small>${persen}%</small>
                    </td>
                </tr>`;
        });
        tbody.innerHTML = html;
    }
    
    function loadKodeAdmin() {
        db.collection('admin').doc('admin_utama').onSnapshot((doc) => {
            if (doc.exists) {
                document.getElementById('kode-admin-saatini').innerText = doc.data().kode_admin;
            }
        });
    }
    
    async function simpanKode(kelasId) {
        const input = document.getElementById(`input-${kelasId}`);
        const kodeBaru = input.value.trim();
        
        if (!kodeBaru) {
            alert('Kode akses tidak boleh kosong!');
            return;
        }
        
        try {
            await db.collection('kelas').doc(kelasId).update({
                kode_akses: kodeBaru,
                terakhir_update: new Date().toLocaleString('id-ID')
            });
            alert(`Kode kelas ${kelasId} berhasil diupdate!`);
        } catch (error) {
            console.error(error);
            alert('Gagal update: ' + error.message);
        }
    }
    
    function resetKode(kelasId) {
        const defaultKode = `UKK-${kelasId}-2026`;
        document.getElementById(`input-${kelasId}`).value = defaultKode;
        simpanKode(kelasId);
    }
    
    async function updateKodeAdmin() {
        const kodeBaru = document.getElementById('kode-admin-baru').value.trim();
        
        if (!kodeBaru) {
            alert('Masukkan kode admin baru!');
            return;
        }
        
        const confirm = window.confirm(`Ubah kode admin menjadi: ${kodeBaru}?`);
        if (!confirm) return;
        
        try {
            await db.collection('admin').doc('admin_utama').update({
                kode_admin: kodeBaru,
                last_login: new Date().toLocaleString('id-ID')
            });
            alert('Kode admin berhasil diupdate!');
            document.getElementById('kode-admin-baru').value = '';
        } catch (error) {
            console.error(error);
            alert('Gagal update: ' + error.message);
        }
    }
</script>
</body>
</html>
