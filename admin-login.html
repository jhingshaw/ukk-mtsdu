<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login · UKK MTs Darul Ulum</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .admin-login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 80% 20%, rgba(199, 160, 58, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 20% 80%, rgba(15, 43, 61, 0.15) 0%, transparent 40%),
                        linear-gradient(145deg, #1a2a38 0%, #0f2b3d 100%);
            padding: 16px;
        }

        .admin-card-premium {
            background: rgba(20, 30, 40, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 40px 32px;
            box-shadow: 
                0 40px 70px -20px rgba(0, 0, 0, 0.5),
                inset 0 1px 2px rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 460px;
            position: relative;
            overflow: hidden;
        }

        .admin-card-premium::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
            opacity: 0.3;
            z-index: -1;
        }

        .admin-icon-2026 {
            text-align: center;
            margin-bottom: 30px;
        }

        .admin-icon-circle {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            background: linear-gradient(145deg, var(--accent), #dbb153);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 30px -10px rgba(199, 160, 58, 0.3);
        }

        .admin-icon-circle i {
            font-size: 50px;
            color: white;
        }

        .admin-title-2026 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(145deg, #fff, #e0e0e0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .admin-subtitle-2026 {
            color: rgba(255,255,255,0.7);
            font-size: 16px;
        }

        .admin-input {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 100px;
            padding: 18px 24px;
            width: 100%;
            font-size: 16px;
            color: white;
            transition: all 0.3s;
        }

        .admin-input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .admin-input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 0 5px rgba(199, 160, 58, 0.2);
        }

        .admin-label {
            color: rgba(255,255,255,0.8);
            margin-bottom: 10px;
            margin-left: 8px;
            display: block;
        }

        .admin-label i {
            color: var(--accent);
            margin-right: 8px;
        }

        .btn-admin-2026 {
            width: 100%;
            padding: 18px;
            background: linear-gradient(145deg, var(--accent), #dbb153);
            color: var(--primary);
            border: none;
            border-radius: 100px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 15px 25px -8px rgba(199, 160, 58, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
        }

        .btn-admin-2026:hover {
            transform: translateY(-3px);
            box-shadow: 0 25px 30px -8px var(--accent);
        }

        .back-link-2026 {
            text-align: center;
            margin-top: 25px;
        }

        .back-link-2026 a {
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 40px;
            background: rgba(255,255,255,0.05);
            transition: all 0.2s;
        }

        .back-link-2026 a:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }
    </style>
</head>
<body>
    <div class="admin-login-wrapper">
        <div class="admin-card-premium">
            <div class="admin-icon-2026">
                <div class="admin-icon-circle">
                    <i class="fas fa-user-shield"></i>
                </div>
                <h1 class="admin-title-2026">ADMIN PANEL</h1>
                <p class="admin-subtitle-2026">MTs Darul Ulum · UKK 2026</p>
            </div>
            
            <div class="input-group-2026">
                <label class="admin-label">
                    <i class="fas fa-lock"></i> Kode Admin
                </label>
                <input type="password" id="kode-admin" class="admin-input" placeholder="Masukkan kode admin rahasia">
            </div>
            
            <button id="btn-login-admin" class="btn-admin-2026">
                <i class="fas fa-arrow-right"></i> AKSES DASHBOARD
            </button>
            
            <div id="error-admin" class="error-message" style="color: #ff8a8a; text-align: center; margin-top: 15px;"></div>
            
            <div class="back-link-2026">
                <a href="index.html">
                    <i class="fas fa-arrow-left"></i> Kembali ke Login Murid
                </a>
            </div>
            
            <footer class="footer" style="margin-top: 40px; color: rgba(255,255,255,0.3);">
                <p>developed by mochamad anugrah saputra</p>
            </footer>
        </div>
    </div>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
