<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login · UKK MTs Darul Ulum</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-soft">
    <div class="container">
        <div class="login-card admin-card">
            <div class="logo-container">
                <i class="fas fa-user-shield admin-icon"></i>
                <h1>Admin Panel</h1>
                <p>MTs Darul Ulum Cimahpar</p>
            </div>
            
            <div class="form-container">
                <h2 class="form-title">🔐 Login Admin UKK 2026</h2>
                
                <div class="input-group">
                    <label for="kode-admin">
                        <i class="fas fa-lock"></i> Kode Admin
                    </label>
                    <input type="password" id="kode-admin" placeholder="Masukkan kode admin">
                </div>
                
                <button id="btn-login-admin" class="btn-primary admin-btn">
                    <i class="fas fa-arrow-right"></i> MASUK ADMIN
                </button>
                
                <div id="error-admin" class="error-message"></div>
            </div>
            
            <div class="back-link">
                <a href="index.html">
                    <i class="fas fa-arrow-left"></i> Kembali ke Login Murid
                </a>
            </div>
            
            <footer class="footer">
                <p>© 2026 MTs Darul Ulum Cimahpar</p>
                <p class="credit">developed by mochamad anugrah saputra</p>
            </footer>
        </div>
    </div>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
</body>
