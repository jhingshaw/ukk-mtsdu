<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Login Murid · UKK MTs Darul Ulum</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-soft">
    <div class="container">
        <div class="login-card">
            <div class="logo-container">
                <img src="assets/logo.png" alt="Logo MTs Darul Ulum" class="logo">
                <h1 class="madrasah-title">MTs Darul Ulum</h1>
                <p class="madrasah-subtitle">Cimahpar · Kota Bogor</p>
            </div>
            
            <div class="form-container">
                <h2 class="form-title">🔐 Login Murid UKK 2026</h2>
                
                <div class="input-group">
                    <label for="kode-kelas">
                        <i class="fas fa-key"></i> Kode Akses Kelas
                    </label>
                    <input type="text" id="kode-kelas" placeholder="Contoh: UKK-8D-2026" autocomplete="off">
                </div>
                
                <button id="btn-login-murid" class="btn-primary">
                    <i class="fas fa-arrow-right"></i> MASUK
                </button>
                
                <div id="error-message" class="error-message"></div>
            </div>
            
            <div class="admin-link">
                <a href="admin-login.html">
                    <i class="fas fa-user-shield"></i> Login Admin
                </a>
            </div>
            
            <footer class="footer">
                <p>© 2026 MTs Darul Ulum Cimahpar</p>
                <p class="credit">developed by mochamad anugrah saputra</p>
            </footer>
        </div>
    </div>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
