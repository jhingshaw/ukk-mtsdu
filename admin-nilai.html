<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Nilai · UKK MTs Darul Ulum</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Dark Premium - Input Nilai */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body.admin-dark-body {
            background: radial-gradient(circle at 80% 20%, rgba(199, 160, 58, 0.12) 0%, transparent 40%),
                        radial-gradient(circle at 20% 80%, rgba(15, 43, 61, 0.2) 0%, transparent 40%),
                        linear-gradient(145deg, #1a2a38 0%, #0f2b3d 100%);
            min-height: 100vh; padding: 20px;
        }

        .admin-dark-container {
            max-width: 800px; margin: 0 auto;
            background: rgba(20, 30, 40, 0.4); backdrop-filter: blur(20px);
            border-radius: 48px; padding: 32px;
            box-shadow: 0 40px 70px -20px rgba(0, 0, 0, 0.5), inset 0 1px 2px rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Header */
        .admin-header-premium {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 32px; padding-bottom: 24px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.05);
            flex-wrap: wrap; gap: 16px;
        }

        .header-left-premium { display: flex; align-items: center; gap: 16px; }
        .logo-glow-small { width: 50px; height: 50px; background: linear-gradient(145deg, #c7a03a, #dbb153); border-radius: 20px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 20px -5px rgba(199, 160, 58, 0.3); }
        .logo-glow-small i { font-size: 26px; color: #0f2b3d; }
        .header-left-premium h2 { font-size: 1.8rem; font-weight: 700; background: linear-gradient(145deg, #fff, #e0e0e0); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .header-left-premium p { color: rgba(255, 255, 255, 0.6); font-size: 0.9rem; margin-top: 4px; }

        .header-right-premium { display: flex; align-items: center; gap: 15px; }
        .btn-back-premium, .btn-logout-premium { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(8px); border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 40px; padding: 12px 24px; color: rgba(255, 255, 255, 0.8); font-weight: 600; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 8px; text-decoration: none; }
        .btn-back-premium:hover { border-color: #c7a03a; color: #c7a03a; }
        .btn-logout-premium:hover { border-color: #b23b3b; color: #b23b3b; }

        /* Card */
        .kelola-card-premium {
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(8px);
            border-radius: 32px; padding: 28px; margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .kelola-card-premium h3 {
            color: white; margin-bottom: 20px; font-size: 1.3rem;
        }

        /* Input */
        .kelola-input-premium {
            width: 100%; padding: 16px 24px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px; color: white; font-size: 1rem;
        }

        .kelola-input-premium:focus {
            outline: none; border-color: #c7a03a;
            background: rgba(255, 255, 255, 0.08);
        }

        /* Buttons */
        .btn-simpan-premium, .btn-simpan-next-premium {
            padding: 16px; border: none; border-radius: 40px;
            font-weight: 700; cursor: pointer; transition: all 0.3s;
            font-size: 1rem;
        }
        .btn-simpan-premium { background: #c7a03a; color: #0f2b3d; }
        .btn-simpan-next-premium { background: rgba(255, 255, 255, 0.1); color: white; border: 1px solid rgba(255, 255, 255, 0.2); }

        .btn-simpan-premium:hover, .btn-simpan-next-premium:hover {
            transform: translateY(-2px);
        }

        .footer-dashboard-premium { text-align: center; margin-top: 48px; padding-top: 24px; border-top: 2px solid rgba(255, 255, 255, 0.05); color: rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body class="admin-dark-body">
    <div class="admin-dark-container">
        <!-- Header -->
        <header class="admin-header-premium">
            <div class="header-left-premium">
                <div class="logo-glow-small"><i class="fas fa-pen"></i></div>
                <div><h2>INPUT NILAI</h2><p>UKK MTs Darul Ulum 2026</p></div>
            </div>
            <div class="header-right-premium">
                <button class="btn-back-premium" onclick="window.location.href='admin-cek-kelas.html'"><i class="fas fa-arrow-left"></i> Kembali</button>
                <button id="btn-logout-admin" class="btn-logout-premium"><i class="fas fa-sign-out-alt"></i> Keluar</button>
            </div>
        </header>
        
        <!-- Data Murid -->
        <div class="kelola-card-premium">
            <h3><i class="fas fa-user-graduate" style="color:#c7a03a;"></i> DATA MURID</h3>
            <p style="color:white; margin-bottom:10px;"><strong>Nama:</strong> <span id="nilai-nama" style="color:#c7a03a;">-</span></p>
            <p style="color:white; margin-bottom:10px;"><strong>Kelas:</strong> <span id="nilai-kelas">-</span></p>
            <p style="color:white; margin-bottom:10px;"><strong>Link Tugas:</strong> <span id="nilai-link" style="color:rgba(255,255,255,0.7);">-</span></p>
            <p><a href="#" id="link-tugas" target="_blank" style="color:#c7a03a; text-decoration:none;">🔗 Buka Link Tugas</a></p>
        </div>
        
        <!-- Input Nilai -->
        <div class="kelola-card-premium">
            <h3><i class="fas fa-star" style="color:#c7a03a;"></i> INPUT NILAI</h3>
            
            <div class="input-group" style="margin-bottom:20px;">
                <label style="color:white; margin-bottom:10px; display:block;">Nilai (0-100)</label>
                <input type="number" id="input-nilai" min="0" max="100" class="kelola-input-premium" placeholder="Contoh: 85">
            </div>
            
            <div class="input-group" style="margin-bottom:20px;">
                <label style="color:white; margin-bottom:10px; display:block;">Catatan (opsional)</label>
                <textarea id="input-catatan" rows="3" class="kelola-input-premium" placeholder="Bagus, tapi kurang rapi..."></textarea>
            </div>
            
            <div style="display: flex; gap: 15px; margin-top: 30px;">
                <button id="btn-simpan-nilai" class="btn-simpan-premium" style="flex:2;">💾 SIMPAN NILAI</button>
                <button id="btn-simpan-next" class="btn-simpan-next-premium" style="flex:1;">⏩ SIMPAN & NEXT</button>
            </div>
        </div>
        
        <footer class="footer-dashboard-premium">
            <p>developed by mochamad anugrah saputra</p>
        </footer>
    </div>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script>
    let currentMuridId = '';
    
    document.addEventListener('DOMContentLoaded', function() {
        // Cek login
        if (!sessionStorage.getItem('is_admin')) {
            window.location.href = 'admin-login.html';
            return;
        }
        
        // Ambil data dari sessionStorage
        currentMuridId = sessionStorage.getItem('nilai_murid_id');
        const nama = sessionStorage.getItem('nilai_nama');
        const kelas = sessionStorage.getItem('nilai_kelas');
        const link = sessionStorage.getItem('nilai_link');
        
        if (!currentMuridId || !nama) {
            alert('Data murid tidak ditemukan!');
            window.location.href = 'admin-cek-kelas.html';
            return;
        }
        
        // Tampilkan data
        document.getElementById('nilai-nama').innerText = nama;
        document.getElementById('nilai-kelas').innerText = kelas;
        document.getElementById('nilai-link').innerText = link ? link.substring(0, 30) + '...' : '-';
        document.getElementById('link-tugas').href = link || '#';
        
        // Load nilai yang sudah ada (jika edit)
        loadNilaiExist();
        
        // Logout
        document.getElementById('btn-logout-admin').addEventListener('click', function() {
            sessionStorage.removeItem('is_admin');
            window.location.href = 'admin-login.html';
        });
        
        // Button simpan
        document.getElementById('btn-simpan-nilai').addEventListener('click', () => simpanNilai(false));
        document.getElementById('btn-simpan-next').addEventListener('click', () => simpanNilai(true));
    });
    
    async function loadNilaiExist() {
        try {
            const snapshot = await db.collection('nilai')
                .where('murid_id', '==', currentMuridId)
                .get();
            
            if (!snapshot.empty) {
                const data = snapshot.docs[0].data();
                document.getElementById('input-nilai').value = data.nilai || '';
                document.getElementById('input-catatan').value = data.catatan || '';
            }
        } catch (error) {
            console.error(error);
        }
    }
    
    async function simpanNilai(next = false) {
        const nilai = parseInt(document.getElementById('input-nilai').value);
        const catatan = document.getElementById('input-catatan').value.trim();
        
        if (isNaN(nilai) || nilai < 0 || nilai > 100) {
            alert('Nilai harus antara 0-100!');
            return;
        }
        
        try {
            // Cek apakah sudah ada nilai sebelumnya
            const snapshot = await db.collection('nilai')
                .where('murid_id', '==', currentMuridId)
                .get();
            
            const dataNilai = {
                murid_id: currentMuridId,
                nama: document.getElementById('nilai-nama').innerText,
                kelas: document.getElementById('nilai-kelas').innerText,
                nilai: nilai,
                catatan: catatan || '-',
                status: 'sudah',
                dinilai_oleh: 'admin',
                waktu_dinilai: new Date().toLocaleString('id-ID')
            };
            
            if (snapshot.empty) {
                // Tambah baru
                await db.collection('nilai').add(dataNilai);
            } else {
                // Update yang lama
                await snapshot.docs[0].ref.update(dataNilai);
            }
            
            // Catat log
            await db.collection('log_aktivitas').add({
                aksi: 'nilai',
                detail: `Admin menilai ${dataNilai.nama} (${dataNilai.kelas}) = ${nilai}`,
                waktu: new Date().toLocaleString('id-ID')
            });
            
            alert('Nilai berhasil disimpan!');
            
            if (next) {
                // Kembali ke halaman cek kelas
                window.location.href = 'admin-cek-kelas.html';
            } else {
                // Refresh halaman
                location.reload();
            }
            
        } catch (error) {
            console.error(error);
            alert('Gagal menyimpan: ' + error.message);
        }
    }
</script>
</body>
</html>
